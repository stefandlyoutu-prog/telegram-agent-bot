<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="google-site-verification" content="6crzNMOZv6pUvS6RNvsHyXUiLtNrDftAhAO_TaR4JcE" />
  <title>m-Oracul</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <div class="app">
    <header class="hero">
      <p class="eyebrow">m-Oracul</p>
      <h1 id="greeting">Привет</h1>
      <p class="sub" id="subtitle">Личные разборы без лишнего шума</p>
    </header>

    <section class="stats" id="stats">
      <div class="stat"><span id="streak">0</span><small>дней подряд</small></div>
      <div class="stat"><span id="credits">0</span><small>бонусов</small></div>
      <div class="stat"><span id="used">0</span><small>сегодня</small></div>
    </section>

    <section class="card-day card-day-btn" id="cardDay" role="button" tabindex="0" data-mod="card_day" aria-label="Открыть карту дня">
      <p class="label">Карта дня · нажми</p>
      <h2 id="cardTitle">—</h2>
      <p id="cardHint"></p>
    </section>

    <section class="quick" id="quickBar">
      <button type="button" class="quick-btn" data-mod="dream">🌙 Сонник</button>
      <button type="button" class="quick-btn" data-action="voice">🎤 Голосом</button>
      <button type="button" class="quick-btn" data-mod="tarot">🔮 Таро</button>
      <button type="button" class="quick-btn" data-mod="horo_today">🌅 Гороскоп</button>
    </section>

    <div id="moduleSections"></div>

    <section class="topics">
      <p class="label">Утренний пуш по теме</p>
      <div class="chips" id="topics">
        <button type="button" data-topic="love">Любовь</button>
        <button type="button" data-topic="money">Деньги</button>
        <button type="button" data-topic="career">Карьера</button>
        <button type="button" data-topic="">Выкл</button>
      </div>
    </section>

    <footer class="cta">
      <button type="button" class="btn primary" id="btnPremium" data-action="premium">Премиум 30 дней</button>
      <button type="button" class="btn ghost" id="btnRef" data-action="ref">Пригласить друга</button>
      <p class="legal"><a href="/oferta" target="_blank" rel="noopener">Оферта</a> · Самозанятый: Морозов Степан Юрьевич · ИНН 615108112390</p>
    </footer>
    <p class="toast" id="toast" aria-live="polite"></p>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
