# Render Blueprint: @MOracul_bot 24/7 (webhook + Mini App)
# Деплой: https://dashboard.render.com/blueprints → New Blueprint Instance → этот репозиторий
services:
  - type: web
    name: moracul
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-oracle.txt
    startCommand: python scripts/run_oracle_cloud.py
    healthCheckPath: /health
    envVars:
      - key: ORACLE_CLOUD
        value: "1"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ORACLE_BOT_TOKEN
        sync: false
      - key: ORACLE_BOT_USERNAME
        value: MOracul_bot
      - key: GROK_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://kupiapi.ru/v1
      - key: LLM_PROXY
        value: ""
      - key: TELEGRAM_PROXY
        value: ""
      - key: MONEY_ADMIN_IDS
        sync: false
      - key: ORACLE_PUSH_ENABLED
        value: "1"
      - key: ORACLE_CHANNEL_POSTS_ENABLED
        value: "1"
      - key: ORACLE_FREE_PER_DAY
        value: "2"
      - key: ORACLE_PAYWALL_EXPERIMENT_UNTIL
        value: "2026-06-24"
      - key: ORACLE_PROMO_CHANNELS
        value: "M_Topgoroskop,signsvishe,auragirlss"
      - key: ORACLE_DB_PATH
        value: /var/data/oracle_bot.db
      # ── Робокасса (оплата картой/СБП в рублях) ──
      - key: ROBOKASSA_LOGIN
        sync: false
      - key: ROBOKASSA_PASSWORD1
        sync: false
      - key: ROBOKASSA_PASSWORD2
        sync: false
      # Тестовые пароли (блок «тестовые платежи» в кабинете). При ROBOKASSA_TEST=1
      # подпись считается ими; боевые ROBOKASSA_PASSWORD1/2 при этом не трогаем.
      - key: ROBOKASSA_TEST_PASSWORD1
        sync: false
      - key: ROBOKASSA_TEST_PASSWORD2
        sync: false
      - key: ROBOKASSA_TEST
        value: "1"        # 1 = тест без списаний; поставь 0 для боевого приёма
      - key: ORACLE_PREMIUM_PRICE_RUB
        value: "299"
      - key: ORACLE_DEEP_PRICE_RUB
        value: "99"
      - key: ROBOKASSA_HASH
        value: "md5"       # как в кабинете Робокассы (Технические настройки)
      - key: ORACLE_STARS_ENABLED
        value: "0"         # 0 = приём только в рублях (без Telegram Stars)
    disk:
      name: oracle-data
      mountPath: /var/data
      sizeGB: 1

  - type: web
    name: work-online
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-work.txt
    startCommand: python scripts/run_work_cloud.py
    healthCheckPath: /health
    envVars:
      - key: WORK_CLOUD
        value: "1"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: WORK_BOT_TOKEN
        sync: false
      - key: WORK_BOT_USERNAME
        value: M_onetest_bot
      - key: MONEY_ADMIN_IDS
        sync: false
      - key: WORK_PUSH_ENABLED
        value: "1"
      - key: MIN_WITHDRAWAL_RUB
        value: "5000"
      - key: WORKER_SHARE
        value: "0.1"
      - key: WORK_DB_PATH
        value: /var/data/work_bot.db
      - key: ORACLE_BOT_USERNAME
        value: MOracul_bot
    disk:
      name: work-data
      mountPath: /var/data
      sizeGB: 1
