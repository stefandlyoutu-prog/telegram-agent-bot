# Render Blueprint: @MOracul_bot 24/7 (webhook + Mini App)
# Деплой: https://dashboard.render.com/blueprints → New Blueprint Instance → этот репозиторий
services:
  - type: web
    name: moracul
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-oracle.txt
    startCommand: python scripts/run_oracle_cloud.py
    healthCheckPath: /health
    envVars:
      - key: ORACLE_CLOUD
        value: "1"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ORACLE_BOT_TOKEN
        sync: false
      - key: ORACLE_BOT_USERNAME
        value: MOracul_bot
      - key: GROK_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://api.openai.com/v1
      - key: LLM_PROXY
        value: ""
      - key: TELEGRAM_PROXY
        value: ""
      - key: MONEY_ADMIN_IDS
        sync: false
      - key: ORACLE_PUSH_ENABLED
        value: "1"
      - key: ORACLE_CHANNEL_POSTS_ENABLED
        value: "1"
      - key: ORACLE_FREE_PER_DAY
        value: "2"
      - key: ORACLE_PAYWALL_EXPERIMENT_UNTIL
        value: "2026-06-24"
      - key: ORACLE_PROMO_CHANNELS
        value: "M_Topgoroskop,signsvishe,auragirlss"
      - key: ORACLE_DB_PATH
        value: /var/data/oracle_bot.db
      # ── Робокасса (оплата картой/СБП в рублях) ──
      - key: ROBOKASSA_LOGIN
        sync: false
      - key: ROBOKASSA_PASSWORD1
        sync: false
      - key: ROBOKASSA_PASSWORD2
        sync: false
      # Тестовые пароли (блок «тестовые платежи» в кабинете). При ROBOKASSA_TEST=1
      # подпись считается ими; боевые ROBOKASSA_PASSWORD1/2 при этом не трогаем.
      - key: ROBOKASSA_TEST_PASSWORD1
        sync: false
      - key: ROBOKASSA_TEST_PASSWORD2
        sync: false
      - key: ROBOKASSA_TEST
        value: "1"        # 1 = тест без списаний; поставь 0 для боевого приёма
      - key: ORACLE_PREMIUM_PRICE_RUB
        value: "299"
      - key: ORACLE_DEEP_PRICE_RUB
        value: "99"
      - key: ORACLE_EXCLUSIVE_HVD_PRICE_RUB
        value: "599"
      - key: ORACLE_ULTRA_PLUS_PRICE_RUB
        value: "1499"
      - key: ORACLE_PDF_HVD_PRICE_RUB
        value: "200"
      - key: ORACLE_PDF_READING_PRICE_RUB
        value: "99"
      - key: ORACLE_ADMIN_IDS
        value: "5845195049"
      - key: ROBOKASSA_HASH
        value: "md5"       # как в кабинете Робокассы (Технические настройки)
      - key: ORACLE_STARS_ENABLED
        value: "0"         # 0 = приём только в рублях (без Telegram Stars)
    disk:
      name: oracle-data
      mountPath: /var/data
      sizeGB: 1

  - type: web
    name: work-online
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-work.txt
    startCommand: python scripts/run_work_cloud.py
    healthCheckPath: /health
    envVars:
      - key: WORK_CLOUD
        value: "1"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: WORK_BOT_TOKEN
        sync: false
      - key: WORK_BOT_USERNAME
        value: M_onetest_bot
      - key: MONEY_ADMIN_IDS
        sync: false
      - key: WORK_PUSH_ENABLED
        value: "1"
      - key: MIN_WITHDRAWAL_RUB
        value: "5000"
      - key: WORKER_SHARE
        value: "0.1"
      - key: WORK_DB_PATH
        value: /var/data/work_bot.db
      - key: ORACLE_BOT_USERNAME
        value: MOracul_bot
    disk:
      name: work-data
      mountPath: /var/data
      sizeGB: 1

  # ── Облачный рендер роликов (чтобы не зависеть от включённого Mac) ──
  # Каждый день: постит сегодняшние VK+YouTube и планирует завтрашние TikTok+Instagram
  # (через upload-post.com). Плана хватает «из коробки» — файловая система эфемерная,
  # каждый запуск самодостаточен. Если словим OOM — поменяй plan на standard.
  - type: cron
    name: oracle-video
    runtime: python
    plan: starter
    schedule: "0 6 * * *"   # 06:00 UTC = 09:00 МСК ежедневно
    buildCommand: pip install -r requirements-video.txt
    startCommand: >-
      python scripts/oracle_video_promo.py run --today-only --platforms vk,youtube --limit 2 &&
      python scripts/tiktok_daily_dropoff.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: VIDEO_TIKTOK_PER_DAY
        value: "2"
      # LLM (сценарии + правка озвучки): платный OpenAI в приоритете
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://api.openai.com/v1
      - key: GROK_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # Озвучка (OpenAI TTS → GCP → edge-tts)
      - key: VIDEO_TTS_MODEL
        value: gpt-4o-mini-tts
      - key: VIDEO_TTS_VOICE
        value: onyx
      - key: VIDEO_TTS_POLISH
        value: "1"
      # Сток-видео для фона
      - key: PEXELS_API_KEY
        sync: false
      - key: PIXABAY_API_KEY
        sync: false
      # VK
      - key: VK_TOKEN
        sync: false
      - key: VK_GROUP_ID
        sync: false
      - key: VK_API_VERSION
        value: "5.199"
      # YouTube (OAuth refresh)
      - key: YOUTUBE_CLIENT_ID
        sync: false
      - key: YOUTUBE_CLIENT_SECRET
        sync: false
      - key: YOUTUBE_REFRESH_TOKEN
        sync: false
      # TikTok + Instagram через upload-post.com (отложенный постинг)
      - key: UPLOAD_POST_API_KEY
        sync: false
      - key: UPLOAD_POST_USER
        sync: false
      - key: UPLOAD_POST_PLATFORMS
        value: tiktok,instagram
      # Отчёт админу в Telegram
      - key: ORACLE_BOT_TOKEN
        sync: false
      - key: MONEY_ADMIN_IDS
        sync: false
